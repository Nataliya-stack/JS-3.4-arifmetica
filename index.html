<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <title>JS - 3.4</title>
</head>
<body class="m-0 p-0 min-h-screen w-full relative">

    <div style="background-image: url('./img/bg.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;" 
         class="fixed inset-0 -z-10 w-full h-full">
    </div>

    <main class="w-full max-w-5xl mx-auto p-4 sm:p-6 lg:p-8 min-h-screen flex flex-col justify-start relative z-10">      
        <div class="w-full bg-white/75 p-5 sm:p-8 rounded-xl shadow-2xl backdrop-blur-md my-4 border border-white/30">            
            <h1 class="mt-2 mb-2 font-extrabold text-3xl text-slate-800">Ejercicios Entrada y Salida de Datos / Aritmética</h1>            
            <p class="bg-slate-700 text-white font-bold text-xl px-4 py-1 rounded-sm mt-4 inline-block mb-2 leading-relaxed">Ejercicio 4</p>            
            <p class="mb-4 leading-relaxed text-gray-700 mt-2">Escribe un programa que calcule los litros de pintura necesarios para pintar una pared rectangular.</p>            
            
            <hr class="border-slate-300 my-6">
            
            <h2 class="mt-2 mb-4 font-bold text-2xl text-slate-800">Formulario</h2>            
          
            <div class="w-full max-w-3xl space-y-4">                
                <div class="flex flex-col sm:flex-row sm:items-center gap-2">
                    <label class="w-full sm:w-1/2 pr-2 text-gray-700 font-medium pl-4" for="altura">Alto de la pared (m):</label>
                    <input class="w-full sm:w-1/2 h-10 rounded-sm border border-slate-300 text-slate-900 font-mono bg-white pl-4 shadow-inner focus:outline-2 focus:outline-slate-500" type="number" id="altura" step="0.1">
                </div>  
              
                <div class="flex flex-col sm:flex-row sm:items-center gap-2">
                    <label class="w-full sm:w-1/2 pr-2 text-gray-700 font-medium pl-4" for="ancho">Ancho de la pared (m):</label>
                    <input class="w-full sm:w-1/2 h-10 rounded-sm border border-slate-300 text-slate-900 font-mono bg-white pl-4 shadow-inner focus:outline-2 focus:outline-slate-500" type="number" id="ancho" step="0.1">
                </div>  
            
                <div class="flex flex-col sm:flex-row sm:items-center gap-2">
                    <label class="w-full sm:w-1/2 pr-2 text-gray-700 font-medium pl-4" for="numero">Manos de pintura a aplicar:</label>
                    <input class="w-full sm:w-1/2 h-10 rounded-sm border border-slate-300 text-slate-900 font-mono bg-white pl-4 shadow-inner focus:outline-2 focus:outline-slate-500" type="number" id="numero" step="1">
                </div>  

                <div class="space-y-2 border-l-4 border-slate-500 pl-4 py-1 my-4">
                    <p id="result" class="font-bold text-xl text-slate-800 mb-0"></p>
                </div>
                   
                <div class="pt-2">
                    <button onclick="calculate()" class="w-full sm:w-auto rounded-md shadow-sm border-2 border-slate-700 bg-slate-700 text-white px-6 py-2.5 my-1 cursor-pointer font-bold active:scale-95 transition-transform hover:bg-slate-600 hover:border-slate-600" type="button">
                        Calcular Litros de pintura
                    </button>
                </div>
            </div> 
        </div>
    </main>
   
    <script src="./js/app.js"></script>
</body>
</html>
